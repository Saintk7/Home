<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SaintK7</title>
  <meta name="description" content="Let yesterday teach, let tomorrow wait, make today the page kindness meets courage." />
  <meta property="og:title" content="SaintK7" />
  <meta property="og:description" content="Let yesterday teach, let tomorrow wait, make today the page kindness meets courage." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://saintk7.com/" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#050505;
      --text:#f5e7b2;
      --muted:#d7c27a;
      --shadow:0 20px 60px rgba(0,0,0,.45);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      background:var(--bg);
      color:#fff;
    }

    body{
      font-family:"Inter", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .wrap{
      width:min(100%, 720px);
      text-align:center;
    }

    .hero-image{
      width:100%;
      max-width:900px;
      height:auto;
      display:block;
      margin:0 auto;
      border-radius:10px;
      box-shadow:var(--shadow);
    }

    .quote{
      margin:28px auto 0;
      max-width:820px;
      font-family:"Cinzel", serif;
      font-size:clamp(1.2rem, 2.2vw, 2rem);
      line-height:1.5;
      color:var(--text);
      letter-spacing:.02em;
      text-shadow:
        0 0 1px rgba(255,255,255,.15),
        0 0 18px rgba(212,175,55,.18);
    }

    .quote span{
      color:var(--muted);
    }

    @media (max-width: 640px){
      body{
        padding:14px;
      }

      .quote{
        margin-top:18px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img
      class="hero-image"
      src="assets/ali.png"
      alt="Muhammad Ali standing in the ring after a knockout"
    />

    <p class="quote">
      Let yesterday teach, let tomorrow wait, make today the page kindness meets courage.
    </p>
  </main>
</body>
</html>
