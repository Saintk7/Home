<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>⚡️ Solana Rent Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* Full-screen animated gradient */
    body { margin:0; height:100vh; overflow:hidden; background:#090c10; font-family:'Exo 2', sans-serif; }
    .bg { position:absolute; inset:0; background:radial-gradient(circle at center, #0d1b2a, #000); }
    .bg::before { content:''; position:absolute; inset:-25%; background:conic-gradient(from 0deg at 50% 50%, #1f8ef1, #33ffdd, #1f8ef1);
      animation: spin 40s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* Floating neon blobs with hue shift */
    .blob { position:absolute; border-radius:50%; mix-blend-mode:screen;
      animation: move 8s ease-in-out infinite, hue 10s linear infinite;
      background:rgba(51,255,221,0.3);
    }
    .blob:nth-child(2) { width:350px; height:350px; top:10%; left:70%; animation-duration:10s; }
    .blob:nth-child(3) { width:250px; height:250px; top:65%; left:25%; animation-duration:7s; }
    @keyframes move {
      0%,100% { transform:translate(0,0) scale(1); }
      50% { transform:translate(30px,-40px) scale(1.1); }
    }
    @keyframes hue { to { filter:hue-rotate(360deg); } }

    /* Card container */
    .card {
      position:relative; z-index:10; max-width:520px; margin:0 auto;
      top:50%; transform:translateY(-50%);
      background:rgba(15,20,30,0.85); border-radius:1rem; padding:2rem;
      box-shadow:0 0 40px rgba(0,0,0,0.7);
      overflow:hidden;
    }
    /* Pulsing header text */
    .card h1 {
      color:#33FFDD; font-size:2.2rem; text-align:center; margin-bottom:0.3rem;
      animation:pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { text-shadow:0 0 10px #33FFDD, 0 0 20px #1f8ef1; }
      50% { text-shadow:0 0 20px #33FFDD, 0 0 40px #1f8ef1; }
    }
    .card p.subtitle { text-align:center; color:#7a8a99; margin-bottom:1.5rem; }

    /* Form styles */
    .form-group { margin-bottom:1.25rem; }
    .form-group label { display:block; color:#7a8a99; font-weight:600; margin-bottom:0.5rem; }
    .form-group input, .form-group select {
      width:100%; padding:0.7rem 1rem; font-size:1rem; border:none; border-radius:0.5rem;
      background:rgba(255,255,255,0.05); color:#E0E1DD; backdrop-filter:blur(4px);
      box-shadow:inset 0 0 8px rgba(0,0,0,0.5);
      transition:box-shadow 0.3s;
    }
    .form-group input:focus, .form-group select:focus {
      outline:none; box-shadow:0 0 12px rgba(51,255,221,0.8);
    }

    /* Glitch button */
    #calcBtn { display:block; width:100%; padding:1rem; font-size:1.1rem; font-weight:700;
      color:#0a0f19; background:#33FFDD; border:none; border-radius:0.75rem; cursor:pointer;
      position:relative; overflow:hidden; margin-top:1rem;
    }
    #calcBtn::before, #calcBtn::after {
      content:''; position:absolute; top:0; left:0; width:100%; height:100%;
      background:rgba(255,255,255,0.15); mix-blend-mode:screen;
      clip-path:polygon(0 2%,100% 1%,100% 15%,0% 12%);
      animation: glitch 2s infinite;
    }
    #calcBtn::after { animation-delay:1s; }
    @keyframes glitch {
      0% { transform:translate(0,0); }
      20% { transform:translate(-5px,5px); }
      40% { transform:translate(5px,-5px); }
      60% { transform:translate(-5px,-5px); }
      80% { transform:translate(5px,5px); }
      100% { transform:translate(0,0); }
    }

    /* Results panel */
    #results { display:none; margin-top:1.75rem; padding:1.5rem;
      background:rgba(255,255,255,0.08); border-radius:0.75rem;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
    }
    #results h2 { color:#1F8EF1; text-align:center; margin-bottom:1rem; }
    #results p { color:#E0E1DD; text-align:center; margin:0.5rem 0; }

    /* Subtle wave at bottom */
    .wave { position:absolute; bottom:0; left:0; width:100%; height:80px; background: url('data:image/svg+xml;<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%230d1b2a" fill-opacity="1" d="M0,64L48,96C96,128,192,192,288,202.7C384,213,480,171,576,133.3C672,96,768,64,864,64C960,64,1056,96,1152,122.7C1248,149,1344,171,1392,181.3L1440,192L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') no-repeat bottom;
      background-size:cover;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="blob"></div>
  <div class="blob"></div>
  <div class="blob"></div>
  <div class="wave"></div>

  <div class="card">
    <h1>⚡️ Solana Rent</h1>
    <p class="subtitle">Calculate your on-chain storage cost</p>
    <div class="form-group">
      <label for="size">Storage Amount</label>
      <input type="number" id="size" placeholder="e.g., 1024">
    </div>
    <div class="form-group">
      <label for="unit">Unit</label>
      <select id="unit">
        <option>Bytes</option>
        <option>KB</option>
        <option>MB</option>
        <option>GB</option>
      </select>
    </div>
    <div class="form-group">
      <label for="customPrice">Custom SOL Price (USD)</label>
      <input type="number" step="0.01" id="customPrice" placeholder="Leave blank for live price">
    </div>
    <button id="calcBtn">Calculate Rent</button>
    <div id="results">
      <h2>💰 Results</h2>
      <p id="lamports"></p>
      <p id="sol"></p>
      <p id="usd"></p>
    </div>
  </div>

  <script>
    const LAMPORTS_PER_SOL = 1e9;
    const unitToBytes = { Bytes:1, KB:1024, MB:1024**2, GB:1024**3 };
    document.getElementById('calcBtn').addEventListener('click', ()=>{
      const size = parseFloat(document.getElementById('size').value)||0;
      const unit = document.getElementById('unit').value;
      const bytes = size * unitToBytes[unit];
      const lamports = Math.ceil(bytes * 3480 * 2);
      const sol = lamports / LAMPORTS_PER_SOL;
      document.getElementById('lamports').textContent = `Lamports: ${lamports.toLocaleString()}`;
      document.getElementById('sol').textContent = `SOL: ${sol.toLocaleString(undefined,{maximumFractionDigits:9})}`;
      const showUsd = price => {
        document.getElementById('usd').textContent = `USD: $${(sol*price).toLocaleString(undefined,{maximumFractionDigits:2})}`;
        document.getElementById('results').style.display = 'block';
      };
      const custom = parseFloat(document.getElementById('customPrice').value);
      if(custom>0) showUsd(custom);
      else fetch('https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=usd')
        .then(r=>r.json()).then(d=>showUsd(d.solana.usd)).catch(()=>{ document.getElementById('usd').textContent='USD N/A'; document.getElementById('results').style.display='block'; });
    });
  </script>
</body>
</html>
