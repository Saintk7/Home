<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solana Rent Calculator</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    #results { display: none; }
  </style>
</head>
<body>
  <div class="container py-5">
    <h1 class="mb-4 text-center">Solana Rent Calculator</h1>
    <div class="row g-3 mb-4">
      <div class="col-md-3">
        <label for="size" class="form-label">Account Size (bytes)</label>
        <input type="number" id="size" class="form-control" placeholder="e.g., 165" value="0">
      </div>
      <div class="col-md-3">
        <label for="rate" class="form-label">Rent Rate (lamports/byte-year)</label>
        <input type="number" id="rate" class="form-control" value="3480">
      </div>
      <div class="col-md-3">
        <label for="threshold" class="form-label">Rent-Exempt Threshold (years)</label>
        <input type="number" step="0.1" id="threshold" class="form-control" value="2">
      </div>
      <div class="col-md-3">
        <label for="customPrice" class="form-label">Custom SOL Price (USD)</label>
        <input type="number" step="0.01" id="customPrice" class="form-control" placeholder="Leave blank to fetch live price">
      </div>
    </div>
    <div class="text-center">
      <button id="calcBtn" class="btn btn-primary px-5">Calculate</button>
    </div>
    <div id="results" class="mt-4 p-4 bg-white rounded shadow-sm">
      <h2>Results</h2>
      <p id="lamports"></p>
      <p id="sol"></p>
      <p id="usd"></p>
    </div>
  </div>

  <script>
    const LAMPORTS_PER_SOL = 1_000_000_000;
    document.getElementById('calcBtn').addEventListener('click', () => {
      const size = parseFloat(document.getElementById('size').value) || 0;
      const rate = parseFloat(document.getElementById('rate').value) || 0;
      const threshold = parseFloat(document.getElementById('threshold').value) || 0;
      const customPrice = parseFloat(document.getElementById('customPrice').value);

      const lamports = size * rate * threshold;
      const sol = lamports / LAMPORTS_PER_SOL;

      document.getElementById('lamports').textContent = 
        `Required lamports: ${lamports.toLocaleString()}`;
      document.getElementById('sol').textContent = 
        `Equivalent SOL: ${sol.toLocaleString(undefined, {maximumFractionDigits: 9})}`;

      function displayUSD(price) {
        const usdValue = sol * price;
        document.getElementById('usd').textContent = 
          `Approx. USD: $${usdValue.toLocaleString(undefined, {maximumFractionDigits: 2})}`;
        document.getElementById('results').style.display = 'block';
      }

      if (!isNaN(customPrice) && customPrice > 0) {
        displayUSD(customPrice);
      } else {
        // Fetch SOL price for USD conversion
        fetch('https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=usd')
          .then(response => response.json())
          .then(data => {
            const livePrice = data.solana.usd;
            displayUSD(livePrice);
          })
          .catch(err => {
            console.error('Price fetch error:', err);
            document.getElementById('usd').textContent = 
              'USD price unavailable. Please enter a custom price.';
            document.getElementById('results').style.display = 'block';
          });
      }
    });
  </script>
</body>
</html>
